# .readthedocs.yaml
version: 2

# Build dokümantasyonunu her formatta oluştur
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - graphviz
    - latexmk
    - texlive-latex-recommended
    - texlive-fonts-recommended

# Sphinx yapılandırması
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

# Python bağımlılıklarını kur
python:
  install:
    - requirements: docs/requirements.txt

# Opsiyonel: Birden fazla format
formats:
  - pdf
  - epub
